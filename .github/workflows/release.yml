name: Release App

# Workflow ini akan berjalan HANYA jika Anda nge-push tag versi baru (misal: v1.0.0)
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # Server akan menjalankan 2 mesin sekaligus: Ubuntu dan Windows
        platform: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Khusus untuk mesin Ubuntu, instal dependensi webkit milik Tauri v2
      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      # Build aplikasi dan otomatis buatkan halaman Release di GitHub
      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }} # Mengambil nama tag (misal v1.0.0)
          releaseName: "Awl Service Bus ${{ github.ref_name }}"
          releaseBody: "Rilis perdana Awl Service Bus v1.0.0. Silakan unduh file .exe untuk Windows atau .deb/.AppImage untuk Linux."
          releaseDraft: false
          prerelease: false
